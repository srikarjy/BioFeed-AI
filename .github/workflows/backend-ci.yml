name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector image: migration 0003 creates the vector extension.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: biofeed
          POSTGRES_PASSWORD: biofeed
          POSTGRES_DB: biofeed
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U biofeed"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # requirements-ml.txt (torch) is deliberately not installed: tests run
      # with EMBEDDING_BACKEND=hash, keeping CI fast.
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg2://biofeed:biofeed@localhost:5432/biofeed
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg2://biofeed:biofeed@localhost:5432/biofeed
          EMBEDDING_BACKEND: hash
        run: pytest
